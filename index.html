<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MRS. KAITX</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .logo-area {
      margin-bottom: 2.5rem;
    }

    .logo {
      font-size: 4.8rem;
      font-weight: 900;
      letter-spacing: -2px;
      background: linear-gradient(90deg, #ff6ec7, #7873f5, #00ddeb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.4rem;
    }

    .tagline {
      font-size: 1.3rem;
      opacity: 0.9;
      margin-top: 0.5rem;
      letter-spacing: 1.5px;
    }

    .socials {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.2rem;
      margin: 2.5rem 0 3.5rem;
    }

    .social-btn {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.12);
      color: white;
      font-size: 1.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.28s ease;
      text-decoration: none;
    }

    .social-btn:hover {
      transform: translateY(-6px) scale(1.08);
      background: rgba(255,255,255,0.14);
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    }

    .social-btn.tg   { color: #29aae1; }
    .social-btn.ig   { color: #e1306c; }
    .social-btn.tt   { color: #ff0050; }
    .social-btn.x    { color: #ffffff; }
    .social-btn.rd   { color: #ff4500; }

    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 1.3rem;
      margin-top: 1rem;
    }

    .big-btn {
      display: inline-block;
      width: 100%;
      max-width: 380px;
      margin: 0 auto;
      padding: 1.35rem 2rem;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-decoration: none;
      color: white;
      border-radius: 50px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-telegram {
      background: linear-gradient(90deg, #0088cc, #00aaff);
      box-shadow: 0 8px 25px rgba(0, 136, 204, 0.4);
    }

    .btn-telegram:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 35px rgba(0, 136, 204, 0.55);
    }

    .btn-subscribe {
      background: linear-gradient(90deg, #ff3366, #ff6b6b);
      box-shadow: 0 8px 25px rgba(255, 51, 102, 0.4);
    }

    .btn-subscribe:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 35px rgba(255, 51, 102, 0.55);
    }

    .footer {
      margin-top: 4rem;
      font-size: 0.9rem;
      opacity: 0.6;
    }

    @media (max-width: 480px) {
      .logo { font-size: 4rem; }
      .social-btn { width: 62px; height: 62px; font-size: 1.7rem; }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="logo-area">
      <div class="logo">MRS. KAITX</div>
      <div class="tagline">let's play 💋 Naughty online</div>
    </div>

    <div class="socials">
      <a href="https://x.com/Chat_MrsKaitx"      target="_blank" class="social-btn x"    title="Twitter / X"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="https://www.instagram.com/mrs_kaitx?igsh=eHl0cmk2NXpxaW80" target="_blank" class="social-btn ig"   title="Instagram"><i class="fa-brands fa-instagram"></i></a>
      <a href="https://www.tiktok.com/@mrs.kaitx" target="_blank" class="social-btn tt"   title="TikTok"><i class="fa-brands fa-tiktok"></i></a>
      <a href="https://reddit.com/user/mrs_kaitx" target="_blank" class="social-btn rd"   title="Reddit"><i class="fa-brands fa-reddit"></i></a>
      <a href="https://t.me/Mrs_kaitx"           target="_blank" class="social-btn tg"   title="Telegram"><i class="fa-brands fa-telegram-plane"></i></a>
    </div>

    <div class="action-buttons">
      <a href="https://t.me/Mrs_kaitx" class="big-btn btn-telegram">
        CHAT ME <i class="fa-solid fa-paper-plane" style="margin-left:10px;"></i>
      </a>

      <a href="https://t.me/Mrs_kaitx" class="big-btn btn-subscribe">
        SIGN UP & SUBSCRIBE NOW 
      </a>
    </div>

    <div class="footer">
      © 2025 MRS. KAITX • All Rights Reserved • CHAT ME: [ https://t.me/Mrs_kaitx ]
    </div>

  </div>

</body>
</html>
